name: Telegram IGC Capture

# Polls the Telegram bot for newly-sent .igc files, commits them into igc/,
# and pushes, then explicitly dispatches build.yml (Build and Deploy
# PgLogStats), which regenerates data and deploys. GitHub cron is
# best-effort, so expect a few minutes of lag; you can also trigger a poll
# manually.
#
# The push alone would NOT trigger build.yml's `on: push`: pushes made with
# the default GITHUB_TOKEN are exempt from triggering other workflows
# (GitHub's anti-recursion rule). So instead of relying on the push event,
# this workflow explicitly fires build.yml via `gh workflow run`, which
# works fine with GITHUB_TOKEN as long as `actions: write` is granted below.

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

# Avoid overlapping polls (which could double-process the same updates).
concurrency:
  group: telegram-capture
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Poll Telegram for new IGC files
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: npm run telegram:poll

      - name: Commit new IGC files
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add igc/
          if git diff --staged --quiet; then
            echo "No new IGC files."
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: add flight log(s) via Telegram"
            git push
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger build/deploy
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run build.yml --ref "${{ github.ref_name }}"
